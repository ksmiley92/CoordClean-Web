<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoordClean</title>

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="controls">
      <header>
        <h1>CoordClean</h1>
        <p class="tagline">Upload coordinates, convert between CRSs, preview on a map.</p>
      </header>

      <label for="fileInput">Coordinate file (CSV or XLSX)</label>
      <input type="file" id="fileInput" accept=".csv,.xlsx" />

      <label for="inputCrs">Input CRS</label>
      <select id="inputCrs">
        <option value="EPSG:4326">WGS84 Lat/Lon (EPSG:4326)</option>
        <option value="EPSG:3857">Web Mercator (EPSG:3857)</option>
      </select>

      <label for="outputCrs">Output CRS</label>
      <select id="outputCrs">
        <option value="EPSG:4326">WGS84 Lat/Lon (EPSG:4326)</option>
        <option value="EPSG:3857">Web Mercator (EPSG:3857)</option>
      </select>

      <button id="convertBtn" class="primary">Convert</button>
      <button id="downloadBtn" disabled>Download Cleaned CSV</button>

      <div id="status" role="status"></div>
    </section>

    <section class="map">
      <div id="map"></div>
    </section>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js" defer></script>
  </body>
</html>
